name: dbt-CI-Build

on:
  push:
    branches: ['**']

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r dbt/dbt-deps.txt
        continue-on-error: false

      - name: Lint with sqlfluff
        run: |
          sqlfluff lint --dialect databricks dbt/
        continue-on-error: false
      - name: dbt parse
        run: |
          dbt parse --project-dir dbt/ --profiles-dir dbt/
        continue-on-error: true
        env:
          DBT_DATABRICKS_HOST: ${{ secrets.DBT_HOST }}
          DBT_DATABRICKS_HTTP_PATH: ${{ secrets.DBT_HTTP_PATH }}
          DBT_DATABRICKS_TOKEN: ${{ secrets.DBT_TOKEN }}

      - name: Generate dbt docs
        run: |
          dbt docs generate --project-dir dbt/ --profiles-dir dbt/
        continue-on-error: true
        env:
          DBT_DATABRICKS_HOST: ${{ secrets.DBT_HOST }}
          DBT_DATABRICKS_HTTP_PATH: ${{ secrets.DBT_HTTP_PATH }}
          DBT_DATABRICKS_TOKEN: ${{ secrets.DBT_TOKEN }}
