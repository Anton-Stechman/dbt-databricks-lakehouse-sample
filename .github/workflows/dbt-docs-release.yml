name: Release - Deploy dbt docs
on:
  push:
    branches:
      - prod

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r dbt/dbt-deps.txt
        continue-on-error: false

      - name: Generate dbt docs
        run: dbt docs generate --project-dir dbt/ --profiles-dir dbt/ --target ${{ env.TARGET }}
        continue-on-error: false
        env:
          TARGET: prod
          DBT_DATABRICKS_HOST: ${{ secrets.DBT_HOST }}
          DBT_DATABRICKS_HTTP_PATH: ${{ secrets.DBT_HTTP_PATH }}
          DBT_DATABRICKS_TOKEN: ${{ secrets.DBT_TOKEN }}

      - name: Deploy docs to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dbt/target
