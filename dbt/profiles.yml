databricks_lakehouse_sample:
  target: "{{ env_var('TARGET') }}"
  outputs:

    ci:
      type: databricks
      catalog: ci # or your Unity Catalog name, e.g. main
      schema: default
      host: "{{ env_var('DBT_DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DBT_DATABRICKS_HTTP_PATH') }}"
      token: "{{ env_var('DBT_DATABRICKS_TOKEN') }}"
      threads: 4

    prod:
      type: databricks
      catalog: prod # or your Unity Catalog name, e.g. main
      schema: default
      host: "{{ env_var('DBT_DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DBT_DATABRICKS_HTTP_PATH') }}"
      token: "{{ env_var('DBT_DATABRICKS_TOKEN') }}"
      threads: 4

    test:
      type: databricks
      catalog: test # or your Unity Catalog name, e.g. main
      schema: default
      host: "{{ env_var('DBT_DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DBT_DATABRICKS_HTTP_PATH') }}"
      token: "{{ env_var('DBT_DATABRICKS_TOKEN') }}"
      threads: 4
