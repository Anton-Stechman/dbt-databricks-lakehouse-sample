version: 2
models:
- name: stg_sales_franchises
  description: Staging view for Sales Franchises
  config:
    contract:
      enforced: true
      alias_types: true
  columns:
  - name: franchiseid
    description: Franchiseid
    data_type: LONG
  - name: name
    description: Name
    data_type: STRING
  - name: city
    description: City
    data_type: STRING
  - name: district
    description: District
    data_type: STRING
  - name: zipcode
    description: Zipcode
    data_type: STRING
  - name: country
    description: Country
    data_type: STRING
  - name: size
    description: Size
    data_type: STRING
  - name: longitude
    description: Longitude
    data_type: DOUBLE
  - name: latitude
    description: Latitude
    data_type: DOUBLE
  - name: supplierid
    description: Supplierid
    data_type: LONG
  - name: is_current
    description: '''{{ doc("is_current") }}'''
    data_type: BOOLEAN
  - name: is_deleted
    description: '''{{ doc("is_deleted") }}'''
    data_type: BOOLEAN
  - name: effective_from
    description: '''{{ doc("effective_from") }}'''
    data_type: TIMESTAMP
  - name: effective_to
    description: '''{{ doc("effective_to") }}'''
    data_type: TIMESTAMP
