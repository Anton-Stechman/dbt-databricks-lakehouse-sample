version: 2
models:
- name: stg_sales_customers
  description: Staging view for Sales Customers
  config:
    contract:
      enforced: true
      alias_types: true
  columns:
  - name: customerID
    description: Customerid
    data_type: LONG
  - name: first_name
    description: First Name
    data_type: STRING
  - name: last_name
    description: Last Name
    data_type: STRING
  - name: email_address
    description: Email Address
    data_type: STRING
  - name: phone_number
    description: Phone Number
    data_type: STRING
  - name: address
    description: Address
    data_type: STRING
  - name: city
    description: City
    data_type: STRING
  - name: state
    description: State
    data_type: STRING
  - name: country
    description: Country
    data_type: STRING
  - name: continent
    description: Continent
    data_type: STRING
  - name: postal_zip_code
    description: Postal Zip Code
    data_type: LONG
  - name: gender
    description: Gender
    data_type: STRING
  - name: is_current
    description: '''{{ doc("is_current") }}'''
    data_type: BOOLEAN
  - name: is_deleted
    description: '''{{ doc("is_deleted") }}'''
    data_type: BOOLEAN
  - name: effective_from
    description: '''{{ doc("effective_from") }}'''
    data_type: TIMESTAMP
  - name: effective_to
    description: '''{{ doc("effective_to") }}'''
    data_type: TIMESTAMP
