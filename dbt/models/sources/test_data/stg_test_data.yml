models:
  - name: stg_test_data
    description: Staging View for test dataset
    config:
      contract:
        enforced: true
        alias_types: true
    columns:
      - name: id
        data_type: BIGINT
        description: Id
      - name: description
        data_type: VARCHAR(150)
        description: Description
      - name: is_enabled
        data_type: BOOLEAN
        description: Flag to identify if this record is enabled.
      - name: is_current
        data_type: BOOLEAN
        description: "{{ doc('is_current') }}"
      - name: is_deleted
        data_type: BOOLEAN
        description: "{{ doc('is_deleted') }}"
      - name: effective_from
        data_type: DATE
        description: "{{ doc('effective_from') }}"
      - name: effective_to
        data_type: DATE
        description: "{{ doc('effective_to') }}"
